pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "src/**/*.ts"
      run: bun run biome check --fix --staged {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bun run commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
