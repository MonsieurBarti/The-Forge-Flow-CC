name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-native:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install

      - name: Build
        run: bun run build

      - name: Upload native binding
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: dist/infrastructure/adapters/sqlite/better_sqlite3.*.node

  publish-release:
    needs: [release-please, build-native]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install

      - name: Build
        run: bun run build

      - name: Download all native bindings
        uses: actions/download-artifact@v4
        with:
          path: dist/infrastructure/adapters/sqlite/
          pattern: native-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/infrastructure/adapters/sqlite/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release-please.outputs.version }}
          files: |
            dist/cli/index.js
            dist/infrastructure/adapters/sqlite/better_sqlite3.*.node
