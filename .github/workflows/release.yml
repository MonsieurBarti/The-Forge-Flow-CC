name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-13
            platform: darwin-x64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install

      - name: Lint
        if: matrix.platform == 'linux-x64'
        run: bun run lint

      - name: Type check
        if: matrix.platform == 'linux-x64'
        run: bun run typecheck

      - name: Run tests
        if: matrix.platform == 'linux-x64'
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify CLI
        run: node dist/cli/index.js --help

      - name: Upload native binding
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: dist/infrastructure/adapters/sqlite/better_sqlite3.*.node

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install

      - name: Build
        run: bun run build

      - name: Download all native bindings
        uses: actions/download-artifact@v4
        with:
          path: dist/infrastructure/adapters/sqlite/
          pattern: native-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/infrastructure/adapters/sqlite/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/cli/index.js
            dist/infrastructure/adapters/sqlite/better_sqlite3.*.node
