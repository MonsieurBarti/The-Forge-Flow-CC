name: CI

on:
  push:
    branches: [main, 'milestone/*']
  pull_request:

env:
  # Opt into Node.js 24 for JavaScript actions (see Node 20 deprecation notice).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: [1.3.11]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Guard against legacy .tff/ paths
        run: bash scripts/check-no-legacy-tff-paths.sh

      - name: Build
        run: bun run build

      # The committed native/better_sqlite3.linux-x64.node is prebuilt against
      # one specific Node ABI. CI's system `node` may differ, so the CLI would
      # fail to load it. Overwrite with the binding `bun install` just compiled
      # for the running Node version.
      - name: Align native sqlite binding with CI node abi
        run: |
          install -D node_modules/better-sqlite3/build/Release/better_sqlite3.node \
            dist/cli/better_sqlite3.linux-x64.node

      - name: Run tests
        run: bun run test

      - name: Verify CLI
        run: node dist/cli/index.js --help
